<div class="container mt-5">

<div class="row">

<div class="col-md-6">
<img src="{{ product.image }}" class="img-fluid">
</div>

<div class="col-md-6">

<h2>{{ product.name }}</h2>
<h2>Your Wishlist</h2>

{% for p in products %}

<div>
<h3>{{ p.name }}</h3>
<p>₹{{ p.price }}</p>
</div>

{% endfor %}

<h3 class="text-success">₹{{ product.price }}</h3>

<p>{{ product.description }}</p>

<a href="/add_to_cart/{{ product.id }}" class="btn btn-warning">
Add to Cart
</a>

<a href="/wishlist/add/{{ product.id }}" class="btn btn-outline-danger">
❤️ Wishlist
</a>

</div>

</div>

</div>
